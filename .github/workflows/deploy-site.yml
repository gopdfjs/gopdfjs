name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:
    inputs:
      vite_base:
        description: "VITE_BASE override (empty = auto: /repo-name/ or / for *.github.io)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WASM
        run: pnpm build:wasm

      - name: Determine VITE_BASE
        id: vite_base
        run: |
          INPUT_BASE="${{ github.event.inputs.vite_base }}"
          REPO_NAME="${{ github.event.repository.name }}"
          if [ -n "$INPUT_BASE" ]; then
            echo "value=$INPUT_BASE" >> "$GITHUB_OUTPUT"
          elif [[ "$REPO_NAME" == *.github.io ]]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          else
            echo "value=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build site
        env:
          VITE_BASE: ${{ steps.vite_base.outputs.value }}
        run: pnpm --filter=@gopdfjs/demo-react build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
